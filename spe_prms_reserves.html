<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPE-PRMS Reserves Classification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        canvas { background-color: #1e293b; border-radius: 0.5rem; border: 1px solid #334155; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        .reserve-btn { transition: all 0.2s ease; border-left: 4px solid transparent; }
        .reserve-btn.active-1p { background-color: #1e293b; border-left-color: #10b981; color: #10b981; font-weight: bold; }
        .reserve-btn.active-2p { background-color: #1e293b; border-left-color: #f59e0b; color: #f59e0b; font-weight: bold; }
        .reserve-btn.active-3p { background-color: #1e293b; border-left-color: #ef4444; color: #ef4444; font-weight: bold; }
        .reserve-btn:hover:not(.active-1p):not(.active-2p):not(.active-3p) { background-color: #334155; }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center">

    <div class="max-w-6xl w-full">
        <header class="mb-6 text-center border-b border-slate-700 pb-4">
            <h1 class="text-3xl font-bold text-sky-400 mb-2">SPE-PRMS Reserves Classification</h1>
            <p class="text-slate-400 text-sm">Evaluating Uncertainty: 1P (Proved), 2P (Probable), and 3P (Possible) Reserves</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- Left Panel: Controls & Definitions -->
            <div class="lg:col-span-4 bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-xl flex flex-col gap-4">
                
                <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-2 border-b border-slate-600 pb-2">Select Reserve Category</h2>
                
                <div class="flex flex-col gap-3">
                    <button onclick="setMode('1p')" id="btn-1p" class="reserve-btn active-1p text-left px-4 py-3 rounded-lg text-sm text-slate-300">
                        <strong>1P (Proved)</strong> - P90 Probability
                    </button>
                    <button onclick="setMode('2p')" id="btn-2p" class="reserve-btn text-left px-4 py-3 rounded-lg text-sm text-slate-300">
                        <strong>2P (Proved + Probable)</strong> - P50 Probability
                    </button>
                    <button onclick="setMode('3p')" id="btn-3p" class="reserve-btn text-left px-4 py-3 rounded-lg text-sm text-slate-300">
                        <strong>3P (Proved + Probable + Possible)</strong> - P10 Probability
                    </button>
                </div>

                <!-- Information Dashboard -->
                <div class="bg-slate-900 p-4 rounded-lg border border-slate-700 shadow-inner flex flex-col gap-3 mt-2 flex-1">
                    <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest border-b border-slate-700 pb-2">Technical Definition</h2>
                    
                    <div id="info-content" class="text-xs text-slate-300 leading-relaxed space-y-2">
                        <!-- Content injected by JS -->
                    </div>
                </div>

            </div>

            <!-- Right Panel: Visualizer -->
            <div class="lg:col-span-8 flex flex-col gap-4">
                
                <div class="flex justify-center bg-slate-900 rounded-xl border border-slate-700 p-2 relative overflow-hidden h-[500px]">
                    <canvas id="reservesCanvas" width="800" height="500" class="w-full h-full object-contain"></canvas>
                    
                    <div class="absolute top-4 left-4 bg-slate-800/90 p-3 rounded-lg border border-slate-600 text-[10px] backdrop-blur text-slate-300 shadow-xl pointer-events-none">
                        <div class="font-bold text-white mb-2 border-b border-slate-600 pb-1">Uncertainty Model</div>
                        <div class="flex items-center gap-2 mb-1"><span class="w-3 h-3 bg-[#10b981] rounded-sm"></span> Proved Area (Highly Certain)</div>
                        <div class="flex items-center gap-2 mb-1"><span class="w-3 h-3 bg-[#f59e0b] rounded-sm"></span> Probable Area (Likely)</div>
                        <div class="flex items-center gap-2 mb-1"><span class="w-3 h-3 bg-[#ef4444] rounded-sm"></span> Possible Area (Unlikely)</div>
                        <div class="flex items-center gap-2 mt-2 pt-2 border-t border-slate-600 text-slate-400">
                            <span class="w-2 h-2 rounded-full bg-white"></span> Producing Well (Data Control Point)
                        </div>
                    </div>
                </div>

            </div>

        </div>
    </div>

    <script>
        const canvas = document.getElementById('reservesCanvas');
        const ctx = canvas.getContext('2d');
        
        let currentMode = '1p'; // 1p, 2p, 3p
        let animProgress = 1.0;
        let animationId;
        
        // Target radii for the animation
        const TARGETS = {
            '1p': { r1: 100, r2: 0, r3: 0 },
            '2p': { r1: 100, r2: 200, r3: 0 },
            '3p': { r1: 100, r2: 200, r3: 320 }
        };
        
        let currentRadii = { r1: 100, r2: 0, r3: 0 };

        const infoData = {
            '1p': `
                <p><strong class="text-emerald-400">Proved Reserves (1P)</strong></p>
                <p>Quantities of petroleum which, by analysis of geoscience and engineering data, can be estimated with <strong class="text-white">reasonable certainty</strong> to be commercially recoverable.</p>
                <p>There should be at least a <strong>90% probability (P90)</strong> that the quantities actually recovered will equal or exceed the estimate.</p>
                <p class="mt-2 p-2 bg-emerald-900/30 border border-emerald-500/50 rounded">Found immediately adjacent to producing wells with strong data support.</p>
            `,
            '2p': `
                <p><strong class="text-amber-400">Proved + Probable Reserves (2P)</strong></p>
                <p>Probable reserves are those additional reserves which analysis indicates are <strong>less likely to be recovered than Proved reserves but more certain to be recovered than Possible reserves</strong>.</p>
                <p>There should be at least a <strong class="text-white">50% probability (P50)</strong> that the actual quantities recovered will equal or exceed the 2P estimate.</p>
                <p class="mt-2 p-2 bg-amber-900/30 border border-amber-500/50 rounded">Often considered the "Best Estimate" or expected case for commercial planning.</p>
            `,
            '3p': `
                <p><strong class="text-red-400">Proved + Probable + Possible Reserves (3P)</strong></p>
                <p>Possible reserves are those additional reserves which are <strong>less likely to be recoverable than Probable reserves</strong>.</p>
                <p>There should be at least a <strong class="text-white">10% probability (P10)</strong> that the actual quantities recovered will equal or exceed the 3P estimate.</p>
                <p class="mt-2 p-2 bg-red-900/30 border border-red-500/50 rounded">Represents the optimistic upside potential, usually extending to the furthest untested boundaries of the reservoir.</p>
            `
        };

        function setMode(mode) {
            currentMode = mode;
            
            // UI Updates
            document.querySelectorAll('.reserve-btn').forEach(btn => {
                btn.className = "reserve-btn text-left px-4 py-3 rounded-lg text-sm text-slate-300";
            });
            document.getElementById('btn-' + mode).classList.add(`active-${mode}`);
            document.getElementById('info-content').innerHTML = infoData[mode];
            
            animProgress = 0; // Restart animation
        }

        function drawReservoirMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const CX = canvas.width / 2;
            const CY = canvas.height / 2;

            // Background matrix
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Grid
            ctx.strokeStyle = '#334155'; ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
            for(let i=0; i<canvas.height; i+=50) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }

            // Smooth interpolation for animation
            currentRadii.r1 += (TARGETS[currentMode].r1 - currentRadii.r1) * 0.1;
            currentRadii.r2 += (TARGETS[currentMode].r2 - currentRadii.r2) * 0.1;
            currentRadii.r3 += (TARGETS[currentMode].r3 - currentRadii.r3) * 0.1;

            // 3P Area (Possible) - Red
            if (currentRadii.r3 > 0) {
                ctx.beginPath();
                ctx.arc(CX, CY, currentRadii.r3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(239, 68, 68, 0.2)'; // Red transparent
                ctx.fill();
                ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 2; ctx.setLineDash([5, 5]);
                ctx.stroke(); ctx.setLineDash([]);
                
                if(currentRadii.r3 > 250) {
                    ctx.fillStyle = '#ef4444'; ctx.font = "bold 14px Arial"; ctx.textAlign="center";
                    ctx.fillText("POSSIBLE (P10)", CX, CY - currentRadii.r3 + 20);
                }
            }

            // 2P Area (Probable) - Amber
            if (currentRadii.r2 > 0) {
                ctx.beginPath();
                ctx.arc(CX, CY, currentRadii.r2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(245, 158, 11, 0.3)'; // Amber transparent
                ctx.fill();
                ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 2; ctx.setLineDash([10, 5]);
                ctx.stroke(); ctx.setLineDash([]);
                
                if(currentRadii.r2 > 150) {
                    ctx.fillStyle = '#f59e0b'; ctx.font = "bold 14px Arial"; ctx.textAlign="center";
                    ctx.fillText("PROBABLE (P50)", CX, CY - currentRadii.r2 + 20);
                }
            }

            // 1P Area (Proved) - Emerald
            if (currentRadii.r1 > 0) {
                ctx.beginPath();
                ctx.arc(CX, CY, currentRadii.r1, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(16, 185, 129, 0.5)'; // Emerald transparent
                ctx.fill();
                ctx.strokeStyle = '#10b981'; ctx.lineWidth = 3;
                ctx.stroke();
                
                ctx.fillStyle = '#10b981'; ctx.font = "bold 14px Arial"; ctx.textAlign="center";
                ctx.fillText("PROVED (P90)", CX, CY - currentRadii.r1 + 20);
            }

            // The Well (Control Point)
            ctx.beginPath();
            ctx.arc(CX, CY, 6, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            ctx.strokeStyle = '#000000'; ctx.lineWidth = 2;
            ctx.stroke();
            
            // Texture overlay (subtle)
            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            for(let i=0; i<50; i++) {
                ctx.beginPath(); ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, 1, 0, Math.PI*2); ctx.fill();
            }
        }

        function animate() {
            drawReservoirMap();
            animationId = requestAnimationFrame(animate);
        }

        // Initialize
        setMode('1p');
        animate();

    </script>
</body>
</html>
