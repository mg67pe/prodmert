<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Dashboard - Petroleum Systems</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        .nav-btn { transition: all 0.2s; border-left: 4px solid transparent; }
        .nav-btn.active { background-color: #1e293b; border-left-color: #38bdf8; color: #38bdf8; font-weight: bold; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); }
        .nav-btn:hover:not(.active) { background-color: #334155; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }
    </style>
</head>
<body class="h-screen w-screen flex bg-slate-900">

    <div class="w-80 bg-slate-800 border-r border-slate-700 flex flex-col h-full shadow-2xl z-10 flex-shrink-0">
        <div class="p-5 border-b border-slate-700 bg-slate-900/30 flex justify-between items-center">
            <h1 class="text-lg font-bold text-sky-400">Engineering Dashboard</h1>
            <a href="index.html" class="text-xs bg-slate-700 p-2 rounded text-white hover:bg-slate-600">🏠 Haritaya Dön</a>
        </div>

        <div class="flex-1 overflow-y-auto custom-scrollbar py-2 px-2 flex flex-col gap-1">
            
            <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 mt-3 px-3 flex items-center gap-2">🏗️ Drilling Operations</div>
            <button onclick="loadSim('aktif_sondaj_ve_amur_d_ng_s.html', this)" class="nav-btn text-left px-4 py-2 rounded-lg text-sm text-slate-300 w-full">Active Drilling & Mud</button>
            <button onclick="loadSim('directional_drilling_geosteering.html', this)" class="nav-btn text-left px-4 py-2 rounded-lg text-sm text-slate-300 w-full">Directional Drilling</button>
            <button onclick="loadSim('primary_cementing_operations.html', this)" class="nav-btn text-left px-4 py-2 rounded-lg text-sm text-slate-300 w-full">Primary Cementing</button>
            <button onclick="loadSim('kuyu_kontrol_kick.html', this)" class="nav-btn text-left px-4 py-2 rounded-lg text-sm text-slate-300 w-full">Well Control (Kick)</button>
            <button onclick="loadSim('matris_asitleme.html', this)" class="nav-btn text-left px-4 py-2 rounded-lg text-sm text-slate-300 w-full">Matrix Acidizing</button>
            <button onclick="loadSim('hidrolik_atlatma.html', this)" class="nav-btn text-left px-4 py-2 rounded-lg text-sm text-slate-300 w-full">Hydraulic Fracturing</button>

            <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 mt-4 px-3 flex items-center gap-2">🚀 Completions & Lift</div>
            <button onclick="loadSim('kuyu_tamamlama_sim.html', this)" class="nav-btn text-left px-4 py-2 rounded-lg text-sm text-slate-300 w-full">Well Completion</button>
            <button onclick="loadSim('gas_lift_yapay_kald_rma_sim.html', this)" class="nav-btn text-left px-4 py-2 rounded-lg text-sm text-slate-300 w-full">Gas Lift Dynamics</button>
            <button onclick="loadSim('esp_pompa_sim.html', this)" class="nav-btn text-left px-4 py-2 rounded-lg text-sm text-slate-300 w-full">ESP Systems</button>
            <button onclick="loadSim('srp_prensibi.html', this)" class="nav-btn text-left px-4 py-2 rounded-lg text-sm text-slate-300 w-full">Sucker Rod Pump</button>
            <button onclick="loadSim('bop_ve_emniyet_vanalar_sim.html', this)" class="nav-btn text-left px-4 py-2 rounded-lg text-sm text-slate-300 w-full">BOP & Safety Valves</button>
            <button onclick="loadSim('sssv_subsurface_safety_valve.html', this)" class="nav-btn text-left px-4 py-2 rounded-lg text-sm text-slate-300 w-full">SSSV Mechanics</button>

            <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 mt-4 px-3 flex items-center gap-2">📊 Reservoir & Petrophysics</div>
            <button onclick="loadSim('petrofizik_ve_kuyu_loglar.html', this)" class="nav-btn text-left px-4 py-2 rounded-lg text-sm text-slate-300 w-full">Well Logging (LWD)</button>
            <button onclick="loadSim('eor_gelistirilmis_petrol_kurtarim_simulatoru.html', this)" class="nav-btn text-left px-4 py-2 rounded-lg text-sm text-slate-300 w-full">EOR Flooding</button>
            <button onclick="loadSim('ugs_yeraltı_dogalgaz_depolama_simulatoru.html', this)" class="nav-btn text-left px-4 py-2 rounded-lg text-sm text-slate-300 w-full">UGS (Gas Storage)</button>
            <button onclick="loadSim('rezervuar_materyal_dengesi_dca_dashboard.html', this)" class="nav-btn text-left px-4 py-2 rounded-lg text-sm text-slate-300 w-full">Material Balance & DCA</button>
            <button onclick="loadSim('kuyu_testi_pta.html', this)" class="nav-btn text-left px-4 py-2 rounded-lg text-sm text-slate-300 w-full">PTA Analysis</button>
            <button onclick="loadSim('pvt_faz_zarfi.html', this)" class="nav-btn text-left px-4 py-2 rounded-lg text-sm text-slate-300 w-full">PVT Phase Envelope</button>

            <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 mt-4 px-3 flex items-center gap-2">🌊 Subsea & Process</div>
            <button onclick="loadSim('denizalt_sistemleri_geli_mi_kusursuz_rota.html', this)" class="nav-btn text-left px-4 py-2 rounded-lg text-sm text-slate-300 w-full">Subsea & ROV</button>
            <button onclick="loadSim('gazin_yolculugu.html', this)" class="nav-btn text-left px-4 py-2 rounded-lg text-sm text-slate-300 w-full">Gas Journey (SCADA)</button>
            <button onclick="loadSim('horizontal_separator_sim.html', this)" class="nav-btn text-left px-4 py-2 rounded-lg text-sm text-slate-300 w-full">3-Phase Separator</button>
            <button onclick="loadSim('hidrat_faz_diyagrami.html', this)" class="nav-btn text-left px-4 py-2 rounded-lg text-sm text-slate-300 w-full">Hydrates & Phase</button>
            <button onclick="loadSim('meg_dongusu.html', this)" class="nav-btn text-left px-4 py-2 rounded-lg text-sm text-slate-300 w-full">MEG Cycle</button>
            <button onclick="loadSim('pigging_operasyonu.html', this)" class="nav-btn text-left px-4 py-2 rounded-lg text-sm text-slate-300 w-full">Pigging Operations</button>

            <div class="mt-8 border-t border-slate-700"></div>
            <button onclick="loadSim('dokumantasyon.html', this)" class="nav-btn text-left px-4 py-4 rounded-lg text-sm text-emerald-400 w-full flex items-center gap-2 bg-emerald-900/10 hover:bg-emerald-900/30 border border-emerald-900/50 mt-2 font-bold">
                <span>📚</span> Documentation & Standards
            </button>
        </div>
    </div>

    <div class="flex-1 h-full relative">
        <iframe id="sim-frame" src="t_rkiye_enerji_haritas.html" class="w-full h-full border-none"></iframe>
    </div>

    <script>
        function loadSim(url, btnElement) {
            document.getElementById('sim-frame').src = url;
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
        }
    </script>
</body>
</html>
