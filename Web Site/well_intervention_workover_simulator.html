<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Well Intervention & Workover Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        canvas { background-color: #1e293b; border-radius: 0.5rem; border: 1px solid #334155; box-shadow: inset 0 0 40px rgba(0,0,0,0.9); }
        .mode-btn { transition: all 0.2s; border-left: 4px solid transparent; }
        .mode-btn.active { background-color: #1e293b; border-left-color: #38bdf8; color: #38bdf8; font-weight: bold; box-shadow: inset 0 0 15px rgba(0,0,0,0.3); }
        .mode-btn:hover:not(.active) { background-color: #334155; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center">

    <div class="max-w-[1400px] w-full">
        <header class="mb-4 text-center border-b border-slate-700 pb-4">
            <h1 class="text-3xl font-bold text-sky-400 mb-2">Well Intervention & Workover Simulator</h1>
            <p class="text-slate-400 text-sm">Comprehensive Downhole Operations: Wireline, Coiled Tubing, Milling, and Logging</p>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-12 gap-6">
            
            <!-- Left Panel: Controls & Menu -->
            <div class="xl:col-span-3 flex flex-col gap-4">
                
                <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-lg h-[450px] flex flex-col">
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 border-b border-slate-600 pb-2 flex-shrink-0">Select Operation Phase</h2>
                    
                    <div class="flex-1 overflow-y-auto custom-scrollbar pr-2 flex flex-col gap-1">
                        <button onclick="setMode('survey')" id="btn-survey" class="mode-btn active text-left px-3 py-3 rounded text-sm text-slate-300">
                            1. Slickline: Pressure Survey
                        </button>
                        <button onclick="setMode('swab')" id="btn-swab" class="mode-btn text-left px-3 py-3 rounded text-sm text-slate-300">
                            2. Slickline: Swabbing
                        </button>
                        <button onclick="setMode('ct')" id="btn-ct" class="mode-btn text-left px-3 py-3 rounded text-sm text-slate-300">
                            3. Coiled Tubing: N2 Lift
                        </button>
                        <button onclick="setMode('fishing')" id="btn-fishing" class="mode-btn text-left px-3 py-3 rounded text-sm text-slate-300">
                            4. Fishing (Tool Retrieval)
                        </button>
                        <button onclick="setMode('perforating')" id="btn-perforating" class="mode-btn text-left px-3 py-3 rounded text-sm text-slate-300">
                            5. Perforating (Explosive)
                        </button>
                        <button onclick="setMode('cementing')" id="btn-cementing" class="mode-btn text-left px-3 py-3 rounded text-sm text-slate-300">
                            6. Squeeze Cementing
                        </button>
                        <button onclick="setMode('pressure_test')" id="btn-pressure_test" class="mode-btn text-left px-3 py-3 rounded text-sm text-slate-300">
                            7. MIT Pressure Test
                        </button>
                        <button onclick="setMode('logging')" id="btn-logging" class="mode-btn text-left px-3 py-3 rounded text-sm text-slate-300">
                            8. Gamma Ray Logging
                        </button>
                        <button onclick="setMode('milling')" id="btn-milling" class="mode-btn text-left px-3 py-3 rounded text-sm text-slate-300">
                            9. CT Milling (Cleanout)
                        </button>
                    </div>

                    <button onclick="startOperation()" id="action-btn" class="w-full mt-4 py-3 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg font-bold shadow-lg transition transform active:scale-95 border border-emerald-400 flex-shrink-0">
                        ▶ EXECUTE OPERATION
                    </button>
                </div>

                <div class="bg-slate-900 p-5 rounded-xl border border-sky-900 shadow-lg flex-1 flex flex-col gap-4">
                    <h2 class="text-lg font-bold text-sky-400 border-b border-sky-900 pb-2">Live Telemetry</h2>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-slate-800 p-3 rounded border border-slate-600 shadow-inner">
                            <div class="text-[10px] text-slate-400 uppercase tracking-wider mb-1" id="lbl-metric-1">Tool Depth</div>
                            <div id="metric-1" class="text-2xl font-bold text-white">0 ft</div>
                        </div>
                        <div class="bg-slate-800 p-3 rounded border border-slate-600 shadow-inner">
                            <div class="text-[10px] text-slate-400 uppercase tracking-wider mb-1" id="lbl-metric-2">Weight Ind.</div>
                            <div id="metric-2" class="text-2xl font-bold text-amber-400">500 lbs</div>
                        </div>
                        <div class="bg-slate-800 p-3 rounded border border-slate-600 shadow-inner col-span-2">
                            <div class="text-[10px] text-slate-400 uppercase tracking-wider mb-1">Downhole Status</div>
                            <div id="metric-status" class="text-sm font-bold text-slate-400 leading-tight">Waiting at surface...</div>
                        </div>
                    </div>

                    <div id="desc-box" class="mt-2 text-xs text-slate-300 bg-slate-800/50 p-3 rounded border border-slate-700 leading-relaxed overflow-y-auto custom-scrollbar flex-1">
                        Select an operation to view engineering details.
                    </div>
                </div>
            </div>

            <!-- Right Panel: Canvas -->
            <div class="xl:col-span-9 relative flex justify-center bg-slate-900 rounded-xl border border-slate-700 p-2 overflow-hidden">
                <canvas id="intervCanvas" width="900" height="700" class="max-w-full h-auto"></canvas>
                
                <!-- Dynamic Legend -->
                <div id="canvas-legend" class="absolute top-4 right-4 bg-slate-900/90 p-3 rounded-lg border border-slate-600 text-[10px] backdrop-blur text-slate-300 shadow-xl pointer-events-none">
                    <!-- Filled dynamically -->
                </div>
            </div>

        </div>
    </div>

    <script>
        const canvas = document.getElementById('intervCanvas');
        const ctx = canvas.getContext('2d');
        
        // Accurate Coordinate System
        const CX = 450; // Canvas center
        const SURF_Y = 200; // Wellhead
        const WELL_DEPTH = 650; // Bottom of the hole
        const MAX_TOOL_DEPTH = WELL_DEPTH - SURF_Y; // Maximum travel distance (450 px)

        // System State
        let mode = 'survey'; 
        let phase = 'surface'; // surface, RIH, bottom, POOH, pumping, testing
        let toolDepth = 0; // 0 to MAX_TOOL_DEPTH
        let targetDepth = MAX_TOOL_DEPTH;
        let fluidLevelY = 350; 
        let actionTimer = 0;
        let animationFrameId;

        // Mode Specific Variables
        let particles = []; 
        let fishCaught = false;
        let perfsShot = false;
        let testPressure = 0;
        let cementHeight = 0;
        let millProgress = 0; // For milling operation
        let logData = []; // Store Gamma Ray curve data

        // UI Elements
        const metric1 = document.getElementById('metric-1');
        const metric2 = document.getElementById('metric-2');
        const lblMetric1 = document.getElementById('lbl-metric-1');
        const lblMetric2 = document.getElementById('lbl-metric-2');
        const metricStatus = document.getElementById('metric-status');
        const actionBtn = document.getElementById('action-btn');
        const descBox = document.getElementById('desc-box');
        const legendBox = document.getElementById('canvas-legend');

        const descriptions = {
            'survey': "<strong>Slickline Survey (PLT):</strong> Lowering memory gauges (Pressure/Temperature) via a solid wire. Records continuous wellbore gradient to analyze reservoir performance.",
            'swab': "<strong>Mechanical Swabbing:</strong> Lowering a rubber swab cup below fluid level. Pulling up expands the cup, lifting a heavy liquid slug to the surface to revive a dead well.",
            'ct': "<strong>Coiled Tubing (N2 Kick-off):</strong> Pushing a continuous steel pipe downhole. Pumping Nitrogen (N2) gas to aerate the heavy liquid column, reducing density until the well flows naturally.",
            'fishing': "<strong>Fishing Operation:</strong> Running an 'Overshot' grapple to precisely latch onto a dropped tool (Fish). Applying massive tension (Overpull) to retrieve it.",
            'perforating': "<strong>Perforating:</strong> Lowering shaped explosive charges precisely to the target depth. Detonation blasts holes through steel casing and cement into the reservoir.",
            'cementing': "<strong>Squeeze Cementing:</strong> Pumping a cement slurry downhole to precisely plug an abandoned zone or seal a casing leak.",
            'pressure_test': "<strong>MIT Pressure Test:</strong> Setting a temporary bridge plug/packer downhole, then filling the casing with red test fluid. Pressurizing to 5000 psi to test casing integrity.",
            'logging': "<strong>Gamma Ray Logging:</strong> Running an electronic sonde on E-line. As it's pulled up (POOH), it scans natural radioactivity to identify shale vs. sandstone layers.",
            'milling': "<strong>CT Milling (Cleanout):</strong> Using Coiled Tubing with a downhole Mud Motor. The motor spins a mill bit to drill out hard scale buildup or barium plugs at the bottom."
        };

        function setMode(newMode) {
            if (phase !== 'surface') return; 
            
            mode = newMode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + mode).classList.add('active');
            descBox.innerHTML = descriptions[mode];
            
            // Reset all precise coordinates and states
            toolDepth = 0;
            fluidLevelY = 350;
            particles = [];
            fishCaught = false;
            perfsShot = false;
            testPressure = 0;
            cementHeight = 0;
            millProgress = 0;
            logData = [];
            actionTimer = 0;
            
            // Set Target Depths explicitly to fix alignment issues
            if (mode === 'fishing') targetDepth = MAX_TOOL_DEPTH - 50; // Stop exactly at the fish
            else if (mode === 'perforating') targetDepth = MAX_TOOL_DEPTH - 70; // Stop exactly at target zone
            else if (mode === 'milling') targetDepth = MAX_TOOL_DEPTH - 70; // Stop exactly at scale plug top
            else if (mode === 'cementing') targetDepth = MAX_TOOL_DEPTH - 10;
            else targetDepth = MAX_TOOL_DEPTH;

            // Setup specific UI metrics based on mode
            if (mode === 'pressure_test') {
                lblMetric1.innerText = "Time (sec)";
                lblMetric2.innerText = "Surface Pressure";
                metric1.innerText = "0.0";
                metric2.innerText = "0 psi";
            } else if (mode === 'logging') {
                lblMetric1.innerText = "Tool Depth";
                lblMetric2.innerText = "Gamma Ray (API)";
                metric1.innerText = "0 ft";
                metric2.innerText = "-";
            } else {
                lblMetric1.innerText = "Tool Depth";
                lblMetric2.innerText = "Weight Ind. (Tension)";
                metric1.innerText = "0 ft";
                metric2.innerText = "500 lbs";
            }

            metricStatus.innerText = "Waiting at surface. Ready to execute.";
            metricStatus.className = "text-sm font-bold text-slate-400 leading-tight";
            
            updateLegend();
        }

        function updateLegend() {
            let html = `<div class="font-bold text-white mb-2 border-b border-slate-600 pb-1">Legend</div>`;
            if (mode === 'ct' || mode === 'milling') {
                html += `<div class="flex items-center gap-2 mb-1"><span class="w-3 h-3 bg-[#f59e0b]"></span> CT Unit & Injector</div>`;
                if(mode==='ct') html += `<div class="flex items-center gap-2 mb-1"><span class="w-3 h-3 rounded-full bg-white"></span> N2 Gas</div>`;
                if(mode==='milling') html += `<div class="flex items-center gap-2 mb-1"><span class="w-3 h-3 bg-red-800"></span> Scale Plug / Blockage</div>`;
            } else if (mode === 'fishing') {
                html += `<div class="flex items-center gap-2 mb-1"><span class="w-3 h-3 bg-red-600"></span> Dropped Tool (Fish)</div>`;
                html += `<div class="flex items-center gap-2 mb-1"><span class="w-3 h-[2px] bg-slate-400"></span> Overshot Grapple</div>`;
            } else if (mode === 'perforating') {
                html += `<div class="flex items-center gap-2 mb-1"><span class="w-3 h-3 bg-yellow-500"></span> Explosive Gun</div>`;
                html += `<div class="flex items-center gap-2 mb-1"><span class="w-3 h-[2px] bg-white border border-dashed"></span> Perforation Holes</div>`;
            } else if (mode === 'cementing') {
                html += `<div class="flex items-center gap-2 mb-1"><span class="w-3 h-3 bg-gray-500"></span> Cement Slurry</div>`;
            } else if (mode === 'pressure_test') {
                html += `<div class="flex items-center gap-2 mb-1"><span class="w-3 h-3 bg-red-600"></span> High Pressure Fluid</div>`;
                html += `<div class="flex items-center gap-2 mb-1"><span class="w-3 h-3 bg-black"></span> Bridge Plug (Packer)</div>`;
            } else if (mode === 'logging') {
                html += `<div class="flex items-center gap-2 mb-1"><span class="w-3 h-[2px] bg-green-400"></span> Gamma Ray Sensor</div>`;
                html += `<div class="flex items-center gap-2 mb-1"><span class="w-3 h-[2px] bg-purple-400"></span> Real-time Log Curve</div>`;
            }
            html += `<div class="flex items-center gap-2"><span class="w-3 h-3 bg-[#1d4ed8]"></span> Wellbore Fluid</div>`;
            legendBox.innerHTML = html;
        }

        function startOperation() {
            if (phase === 'surface') {
                actionBtn.innerText = "⛔ EMERGENCY STOP";
                actionBtn.classList.replace('bg-emerald-600', 'bg-red-600');
                actionBtn.classList.replace('hover:bg-emerald-500', 'hover:bg-red-500');
                actionBtn.classList.replace('border-emerald-400', 'border-red-400');
                
                if (mode === 'pressure_test') {
                    phase = 'testing';
                    metricStatus.innerText = "Filling casing and pumping against plug...";
                    metricStatus.className = "text-sm font-bold text-amber-400 leading-tight";
                } else {
                    phase = 'RIH';
                    metricStatus.innerText = "Running In Hole (RIH)...";
                    metricStatus.className = "text-sm font-bold text-sky-400 leading-tight";
                }
            } else {
                // ABORT
                phase = 'surface';
                toolDepth = 0;
                particles = [];
                actionBtn.innerText = "▶ EXECUTE OPERATION";
                actionBtn.classList.replace('bg-red-600', 'bg-emerald-600');
                actionBtn.classList.replace('hover:bg-red-500', 'hover:bg-emerald-500');
                actionBtn.classList.replace('border-red-400', 'border-emerald-400');
                metricStatus.innerText = "Operation Aborted by Engineer.";
                metricStatus.className = "text-sm font-bold text-red-400 leading-tight";
            }
        }

        function updateMetrics() {
            if (mode === 'pressure_test') {
                metric1.innerText = (actionTimer / 60).toFixed(1) + " s";
                metric2.innerText = Math.floor(testPressure) + " psi";
                if (testPressure > 4800) metric2.className = "text-2xl font-bold text-red-500 animate-pulse";
                else metric2.className = "text-2xl font-bold text-amber-400";
                return;
            }

            let displayedDepth = Math.floor(toolDepth * 10);
            metric1.innerText = displayedDepth + " ft";

            if (mode === 'logging') {
                if (logData.length > 0 && phase === 'POOH') {
                    metric2.innerText = Math.floor(logData[logData.length-1].gr) + " API";
                    metric2.className = "text-2xl font-bold text-green-400";
                } else {
                    metric2.innerText = "-";
                    metric2.className = "text-2xl font-bold text-slate-400";
                }
                return;
            }

            // Calculate Tension/Weight
            let baseWeight = (mode === 'ct' || mode === 'milling') ? 5000 : 500;
            let lineWeight = Math.floor(toolDepth * (mode === 'ct' || mode === 'milling' ? 3 : 0.5));
            let buoyancy = (toolDepth > fluidLevelY) ? (mode === 'ct' || mode === 'milling' ? 1000 : 100) : 0;
            let overpull = 0;

            if (mode === 'swab' && phase === 'POOH') overpull = 2500; 
            if (mode === 'fishing' && fishCaught && phase === 'POOH') overpull = 8000; // Dragging heavy fish
            if (mode === 'fishing' && phase === 'bottom') overpull = -300; // Slacking off weight to latch
            if (mode === 'milling' && phase === 'bottom') overpull = -1500; // Weight on bit (WOB)

            metric2.className = overpull > 1000 ? "text-2xl font-bold text-red-500" : "text-2xl font-bold text-amber-400";
            metric2.innerText = (baseWeight + lineWeight - buoyancy + overpull) + " lbs";
        }

        class FluidParticle {
            constructor(type, x, y) {
                this.type = type; 
                this.x = x + (Math.random() - 0.5) * 15;
                this.y = y;
                this.active = true;
                
                if (type === 'n2') {
                    this.vy = -(3 + Math.random() * 5);
                    this.vx = (Math.random() - 0.5) * 2;
                } else if (type === 'slug') {
                    this.vy = 0; this.vx = 0; 
                } else if (type === 'cement') {
                    this.vy = 2 + Math.random(); 
                    this.vx = (Math.random() - 0.5);
                } else if (type === 'cuttings') {
                    this.vy = -(2 + Math.random() * 4); // Fly up annulus
                    this.vx = (Math.random() - 0.5) * 6; // scatter out
                }
            }
            update(refY) {
                if (this.type === 'n2' || this.type === 'cuttings') {
                    this.y += this.vy; this.x += this.vx;
                    // Keep in annulus
                    if (this.x < CX - 14) this.x = CX - 14;
                    if (this.x > CX + 14) this.x = CX + 14;
                    if (this.y < SURF_Y) this.active = false;
                } else if (this.type === 'slug') {
                    this.y = refY - 10 - Math.random() * 40;
                    if (this.y < SURF_Y) this.active = false;
                } else if (this.type === 'cement') {
                    this.y += this.vy; this.x += this.vx;
                    if (this.y > WELL_DEPTH) this.active = false; 
                }
            }
            draw() {
                if(!this.active) return;
                ctx.beginPath();
                if (this.type === 'n2') { ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.arc(this.x, this.y, 2, 0, Math.PI*2); }
                else if (this.type === 'slug') { ctx.fillStyle = 'rgba(29, 78, 216, 0.9)'; ctx.arc(this.x, this.y, 4, 0, Math.PI*2); }
                else if (this.type === 'cement') { ctx.fillStyle = '#6b7280'; ctx.arc(this.x, this.y, 3, 0, Math.PI*2); }
                else if (this.type === 'cuttings') { ctx.fillStyle = '#78350f'; ctx.fillRect(this.x, this.y, 3, 3); }
                ctx.fill();
            }
        }

        function drawEnvironment() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Background
            ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, canvas.width, SURF_Y); // Sky
            ctx.fillStyle = '#451a03'; ctx.fillRect(0, SURF_Y, canvas.width, canvas.height - SURF_Y); // Ground
            ctx.fillStyle = '#713f12'; ctx.fillRect(0, WELL_DEPTH - 80, canvas.width, 100); // Reservoir layer

            // Casing & Annulus
            ctx.fillStyle = '#64748b'; ctx.fillRect(CX - 40, SURF_Y, 80, canvas.height); // Casing
            ctx.fillStyle = '#0f172a'; ctx.fillRect(CX - 30, SURF_Y, 60, canvas.height); // Annulus Void
            ctx.fillStyle = '#cbd5e1'; ctx.fillRect(CX - 20, SURF_Y, 40, canvas.height); // Tubing
            ctx.fillStyle = '#0f172a'; ctx.fillRect(CX - 15, SURF_Y, 30, canvas.height); // Tubing Inner

            // Pressure Test Logic (Red Fluid)
            if (mode === 'pressure_test') {
                // Draw Bridge Plug / Packer at bottom
                let plugY = WELL_DEPTH - 80;
                ctx.fillStyle = '#000'; ctx.fillRect(CX - 30, plugY, 60, 20); // Packer seals casing
                
                // Red test fluid filling
                if (phase !== 'surface') {
                    ctx.fillStyle = '#dc2626'; // High pressure red fluid
                    // Simulate compressing the fluid as pressure rises
                    let compressionOffset = (testPressure / 5000) * 10;
                    ctx.fillRect(CX - 30, SURF_Y + compressionOffset, 60, plugY - SURF_Y - compressionOffset);
                }
            } else {
                // Normal Wellbore Fluids
                ctx.fillStyle = '#1e3a8a'; // Blue dead fluid
                let currentFluidY = fluidLevelY;
                if ((mode === 'ct' || mode === 'milling') && phase === 'bottom') {
                    currentFluidY -= Math.random() * 10; // Bubbling effect
                    let grad = ctx.createLinearGradient(0, currentFluidY, 0, canvas.height);
                    grad.addColorStop(0, 'rgba(255,255,255,0.5)'); grad.addColorStop(1, '#1e3a8a');
                    ctx.fillStyle = grad;
                }
                ctx.fillRect(CX - 15, currentFluidY, 30, canvas.height);
            }

            // Perforations
            if (perfsShot || mode !== 'perforating') {
                ctx.fillStyle = '#0f172a';
                for(let y = WELL_DEPTH - 70; y <= WELL_DEPTH - 30; y += 15) {
                    ctx.fillRect(CX - 40, y, 15, 5); ctx.fillRect(CX + 25, y, 15, 5);
                }
            }

            // Cement Build up
            if (cementHeight > 0) {
                ctx.fillStyle = '#6b7280';
                ctx.fillRect(CX - 30, WELL_DEPTH - cementHeight, 60, cementHeight);
            }

            // Fishing (Dropped Tool) exactly at WELL_DEPTH - 50
            if (mode === 'fishing' && !fishCaught) {
                ctx.fillStyle = '#dc2626'; 
                ctx.fillRect(CX - 10, WELL_DEPTH - 50, 20, 40);
            }

            // Milling (Scale / Barium Plug)
            if (mode === 'milling') {
                ctx.fillStyle = '#7f1d1d'; // Hard red/brown scale
                let scaleTop = WELL_DEPTH - 70 + millProgress; // Shrinks down
                if (scaleTop < WELL_DEPTH) {
                    ctx.fillRect(CX - 15, scaleTop, 30, WELL_DEPTH - scaleTop);
                }
            }

            // Surface Equipment
            drawSurfaceEquipment();

            // Gamma Ray Log Curve Overlay
            if (mode === 'logging' && logData.length > 0) {
                ctx.strokeStyle = '#a855f7'; ctx.lineWidth = 2;
                ctx.beginPath();
                for(let i=0; i<logData.length; i++) {
                    let d = logData[i];
                    // Map GR (0-150 API) to X (20-150)
                    let xMap = 20 + (d.gr / 150) * 100;
                    let yMap = SURF_Y + d.depth;
                    if (i===0) ctx.moveTo(xMap, yMap); else ctx.lineTo(xMap, yMap);
                }
                ctx.stroke();
                
                // Log Header
                ctx.fillStyle = '#fff'; ctx.font="10px Arial";
                ctx.fillText("Gamma Ray", 20, SURF_Y - 10);
                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                ctx.fillRect(20, SURF_Y, 100, canvas.height - SURF_Y);
            }
        }

        function drawSurfaceEquipment() {
            // Base Wellhead
            ctx.fillStyle = '#475569'; ctx.fillRect(CX - 50, SURF_Y - 20, 100, 20);
            // BOP / Tree
            ctx.fillStyle = '#b91c1c'; ctx.fillRect(CX - 25, SURF_Y - 60, 50, 40);

            if (mode === 'ct' || mode === 'milling') {
                // High-End Coiled Tubing Unit
                ctx.fillStyle = '#f59e0b'; // Amber Injector Head
                ctx.fillRect(CX - 35, SURF_Y - 140, 70, 80);
                // Gooseneck
                ctx.strokeStyle = '#facc15'; ctx.lineWidth = 10; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(CX, SURF_Y - 140); ctx.quadraticCurveTo(CX, SURF_Y - 250, CX - 150, SURF_Y - 200); ctx.stroke();
                // CT Truck & Reel
                ctx.fillStyle = '#334155'; ctx.fillRect(CX - 280, SURF_Y - 40, 160, 40); // Truck
                ctx.fillStyle = '#0f172a'; ctx.beginPath(); ctx.arc(CX-250, SURF_Y, 15, 0, Math.PI*2); ctx.arc(CX-150, SURF_Y, 15, 0, Math.PI*2); ctx.fill(); 
                ctx.fillStyle = '#facc15'; ctx.beginPath(); ctx.arc(CX - 200, SURF_Y - 100, 60, 0, Math.PI*2); ctx.fill(); // Reel
                ctx.fillStyle = '#fff'; ctx.font="12px Arial"; ctx.fillText("CTU", CX - 215, SURF_Y - 20);
            } else if (mode === 'pressure_test') {
                // Pumping Unit
                ctx.fillStyle = '#10b981'; ctx.fillRect(CX - 200, SURF_Y - 40, 100, 40); // Pump truck
                ctx.strokeStyle = '#dc2626'; ctx.lineWidth = 4; // High pressure line
                ctx.beginPath(); ctx.moveTo(CX - 100, SURF_Y - 20); ctx.lineTo(CX - 25, SURF_Y - 40); ctx.stroke();
            } else {
                // Wireline / General Slickline Setup
                ctx.fillStyle = '#cbd5e1'; ctx.fillRect(CX - 15, 50, 30, SURF_Y - 110); // Lubricator
                ctx.fillStyle = '#475569'; ctx.fillRect(CX + 150, SURF_Y - 60, 100, 60); // Truck
                ctx.fillStyle = '#0f172a'; ctx.beginPath(); ctx.arc(CX+170, SURF_Y, 15, 0, Math.PI*2); ctx.arc(CX+230, SURF_Y, 15, 0, Math.PI*2); ctx.fill(); 
                // Wire
                ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(CX + 200, SURF_Y - 50); ctx.lineTo(CX, 20); ctx.lineTo(CX, 50); ctx.stroke();
                ctx.fillStyle = '#facc15'; ctx.beginPath(); ctx.arc(CX, 20, 15, 0, Math.PI*2); ctx.fill();
            }
        }

        function drawTool() {
            if (mode === 'pressure_test') return; // No tool moving in pressure test

            let actualY = SURF_Y + toolDepth; 

            // Draw line/pipe
            if (mode === 'ct' || mode === 'cementing' || mode === 'milling') {
                ctx.fillStyle = '#facc15'; ctx.fillRect(CX - 6, SURF_Y - 100, 12, actualY - (SURF_Y - 100));
            } else {
                ctx.fillStyle = '#94a3b8'; ctx.fillRect(CX - 1, 50, 2, actualY - 50);
            }

            // Specific Tool attachments
            if (mode === 'survey') {
                ctx.fillStyle = '#e2e8f0'; ctx.fillRect(CX - 5, actualY, 10, 40); // Gauges
                ctx.fillStyle = (Date.now() % 500 > 250) ? '#10b981' : '#0f172a'; ctx.fillRect(CX - 2, actualY + 10, 4, 4); // LED
            } else if (mode === 'swab') {
                ctx.fillStyle = '#94a3b8'; ctx.fillRect(CX - 4, actualY, 8, 30); // Mandrel
                ctx.fillStyle = '#111827'; // Rubber cup
                if (phase === 'POOH') {
                    ctx.beginPath(); ctx.moveTo(CX - 14, actualY + 10); ctx.lineTo(CX + 14, actualY + 10); ctx.lineTo(CX + 4, actualY + 25); ctx.lineTo(CX - 4, actualY + 25); ctx.fill();
                } else {
                    ctx.fillRect(CX - 6, actualY + 10, 12, 15);
                }
            } else if (mode === 'ct') {
                ctx.fillStyle = '#94a3b8'; ctx.beginPath(); ctx.moveTo(CX - 8, actualY); ctx.lineTo(CX + 8, actualY); ctx.lineTo(CX, actualY + 15); ctx.fill(); // Nozzle
            } else if (mode === 'fishing') {
                ctx.fillStyle = '#64748b'; ctx.fillRect(CX - 8, actualY, 16, 20); // Overshot body
                if (fishCaught) {
                    ctx.fillStyle = '#dc2626'; ctx.fillRect(CX - 10, actualY + 10, 20, 40); // Dragging fish perfectly aligned
                } else {
                    ctx.fillStyle = '#94a3b8'; // Grapple claws
                    ctx.beginPath(); ctx.moveTo(CX - 8, actualY + 20); ctx.lineTo(CX - 12, actualY + 30); ctx.lineTo(CX - 4, actualY + 20); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(CX + 8, actualY + 20); ctx.lineTo(CX + 12, actualY + 30); ctx.lineTo(CX + 4, actualY + 20); ctx.fill();
                }
            } else if (mode === 'perforating') {
                ctx.fillStyle = '#eab308'; ctx.fillRect(CX - 6, actualY, 12, 50); // Gun body exactly matches 50px
                ctx.fillStyle = '#000'; // Charges
                for(let i=10; i<45; i+=10) { ctx.beginPath(); ctx.arc(CX, actualY+i, 2, 0, Math.PI*2); ctx.fill(); }
                if (phase === 'bottom' && actionTimer % 20 < 10 && !perfsShot) {
                    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(CX, actualY+25, 40, 0, Math.PI*2); ctx.fill(); // Flashes
                }
            } else if (mode === 'cementing') {
                ctx.fillStyle = '#94a3b8'; ctx.fillRect(CX - 4, actualY, 8, 30); // Stinger
            } else if (mode === 'logging') {
                ctx.fillStyle = '#e2e8f0'; ctx.fillRect(CX - 4, actualY, 8, 40); // Sonde
                // Scan beam effect
                let scanAlpha = 0.2 + Math.abs(Math.sin(Date.now()/200)) * 0.3;
                ctx.fillStyle = `rgba(74, 222, 128, ${scanAlpha})`;
                ctx.beginPath(); ctx.moveTo(CX, actualY+20); ctx.arc(CX, actualY+20, 30, Math.PI/4, Math.PI*3/4); ctx.fill();
                ctx.beginPath(); ctx.moveTo(CX, actualY+20); ctx.arc(CX, actualY+20, 30, Math.PI*5/4, Math.PI*7/4); ctx.fill();
            } else if (mode === 'milling') {
                ctx.fillStyle = '#3b82f6'; ctx.fillRect(CX - 6, actualY, 12, 20); // Mud motor
                ctx.fillStyle = '#94a3b8'; // Mill bit rotating
                let millOffset = (Date.now() % 100 > 50) ? 2 : -2;
                ctx.beginPath(); ctx.moveTo(CX - 8 + millOffset, actualY + 20); ctx.lineTo(CX + 8 + millOffset, actualY + 20); ctx.lineTo(CX + millOffset, actualY + 30); ctx.fill();
            }
        }

        function animate() {
            // STATE MACHINE
            if (phase === 'testing') {
                actionTimer++;
                if (testPressure < 5000) testPressure += 50; 
                else if (actionTimer > 180) {
                    metricStatus.innerText = "Test Passed. Integrity verified at 5000 psi.";
                    metricStatus.className = "text-sm font-bold text-emerald-400 leading-tight";
                    phase = 'surface'; 
                    actionBtn.innerText = "▶ RESET SYSTEM";
                } else {
                    metricStatus.innerText = "Holding pressure steady at 5000 psi...";
                    metricStatus.className = "text-sm font-bold text-sky-400 leading-tight animate-pulse";
                }
            }
            else if (phase === 'RIH') {
                let speed = (mode === 'ct' || mode === 'cementing' || mode === 'milling') ? 2 : 4;
                toolDepth += speed;
                
                // Update target depth dynamically for milling (drilling down)
                if (mode === 'milling') targetDepth = (WELL_DEPTH - SURF_Y) - 70 + millProgress;

                if (toolDepth >= targetDepth) {
                    toolDepth = targetDepth;
                    phase = 'bottom';
                    actionTimer = 0;
                    
                    // Specific Bottom Messages
                    if (mode === 'survey') {
                        metricStatus.innerText = "Target depth reached. Recording P/T Gradients...";
                        metricStatus.className = "text-sm font-bold text-purple-400 leading-tight";
                    } else if (mode === 'swab') {
                        metricStatus.innerText = "Below fluid level. Expanding swab cup...";
                        metricStatus.className = "text-sm font-bold text-amber-400 leading-tight";
                        for(let i=0; i<30; i++) particles.push(new FluidParticle('slug', CX, SURF_Y + toolDepth));
                    } else if (mode === 'ct') {
                        metricStatus.innerText = "Pumping N2 Gas. Aerating fluid column...";
                        metricStatus.className = "text-sm font-bold text-white leading-tight";
                    } else if (mode === 'fishing') {
                        metricStatus.innerText = "Latching onto Fish. Applying Overpull...";
                        metricStatus.className = "text-sm font-bold text-amber-500 leading-tight";
                    } else if (mode === 'perforating') {
                        metricStatus.innerText = "Position verified. Firing Explosive Charges...";
                        metricStatus.className = "text-sm font-bold text-red-500 leading-tight";
                    } else if (mode === 'cementing') {
                        metricStatus.innerText = "Pumping Cement Slurry...";
                        metricStatus.className = "text-sm font-bold text-gray-400 leading-tight";
                    } else if (mode === 'logging') {
                        metricStatus.innerText = "Reached TD. Ready to pull up and log...";
                        metricStatus.className = "text-sm font-bold text-green-400 leading-tight";
                    } else if (mode === 'milling') {
                        metricStatus.innerText = "Engaged plug. Milling in progress...";
                        metricStatus.className = "text-sm font-bold text-amber-500 leading-tight animate-pulse";
                    }
                }
            } 
            else if (phase === 'bottom') {
                actionTimer++;
                
                // Bottom Operations Time logic
                if (mode === 'ct') {
                    particles.push(new FluidParticle('n2', CX, SURF_Y + toolDepth));
                    particles.push(new FluidParticle('n2', CX, SURF_Y + toolDepth));
                    if (actionTimer > 150) phase = 'POOH';
                } else if (mode === 'survey' || mode === 'swab') {
                    if (actionTimer > 60) phase = 'POOH';
                } else if (mode === 'fishing') {
                    if (actionTimer === 60) fishCaught = true;
                    if (actionTimer > 100) phase = 'POOH';
                } else if (mode === 'perforating') {
                    if (actionTimer === 30) perfsShot = true;
                    if (actionTimer > 80) phase = 'POOH';
                } else if (mode === 'cementing') {
                    particles.push(new FluidParticle('cement', CX, SURF_Y + toolDepth));
                    if (actionTimer % 5 === 0) cementHeight += 2;
                    if (cementHeight > 80) phase = 'POOH';
                } else if (mode === 'logging') {
                    if (actionTimer > 30) {
                        phase = 'POOH';
                        metricStatus.innerText = "Pulling up. Acquiring Gamma Ray Log...";
                        metricStatus.className = "text-sm font-bold text-green-400 leading-tight";
                    }
                } else if (mode === 'milling') {
                    particles.push(new FluidParticle('cuttings', CX, SURF_Y + toolDepth + 20)); // Cuttings flying
                    if (actionTimer % 4 === 0) millProgress += 1;
                    toolDepth = (WELL_DEPTH - SURF_Y) - 70 + millProgress; // Follow the drill bit down
                    if (millProgress >= 70) phase = 'POOH'; // Plug cleared
                }

            } else if (phase === 'POOH') {
                let speed = (mode === 'ct' || mode === 'fishing' || mode === 'logging') ? 2 : 4;
                toolDepth -= speed;
                
                // POOH Logic
                if (mode === 'swab') {
                    metricStatus.innerText = "Pulling heavy fluid slug to surface!";
                    metricStatus.className = "text-sm font-bold text-blue-400 leading-tight";
                    fluidLevelY += 0.5; 
                } else if (mode === 'ct') {
                    metricStatus.innerText = "Pulling out. Well is kicking off!";
                    metricStatus.className = "text-sm font-bold text-emerald-400 leading-tight";
                    particles.push(new FluidParticle('n2', CX, SURF_Y + toolDepth)); 
                } else if (mode === 'fishing') {
                    metricStatus.innerText = "Retrieving Fish (High Tension)...";
                    metricStatus.className = "text-sm font-bold text-red-500 leading-tight";
                } else if (mode === 'logging') {
                    // Generate Log Data
                    let grVal = 30 + Math.random()*20; // Sandstone baseline
                    if (toolDepth > 150 && toolDepth < 250) grVal += 80; // Shale spike
                    if (toolDepth > 350 && toolDepth < 400) grVal += 60; // Shaly sand
                    logData.push({depth: toolDepth, gr: grVal});
                } else if (mode === 'milling') {
                    metricStatus.innerText = "Blockage cleared. Pulling Out Of Hole...";
                    metricStatus.className = "text-sm font-bold text-sky-400 leading-tight";
                }

                if (toolDepth <= 0) {
                    toolDepth = 0;
                    phase = 'surface';
                    actionBtn.innerText = "▶ RESET & RE-RUN";
                    actionBtn.classList.replace('bg-red-600', 'bg-emerald-600');
                    actionBtn.classList.replace('hover:bg-red-500', 'hover:bg-emerald-500');
                    actionBtn.classList.replace('border-red-400', 'border-emerald-400');
                    
                    particles = []; 
                    
                    if (mode === 'ct' || mode === 'swab') {
                        metricStatus.innerText = "Operation Complete. Well is flowing!";
                        metricStatus.className = "text-sm font-bold text-emerald-500 leading-tight";
                    } else if (mode === 'fishing') {
                        metricStatus.innerText = "Fish successfully recovered at surface.";
                        metricStatus.className = "text-sm font-bold text-emerald-500 leading-tight";
                    } else if (mode === 'perforating') {
                        metricStatus.innerText = "Guns retrieved. Reservoir is open to flow.";
                        metricStatus.className = "text-sm font-bold text-emerald-500 leading-tight";
                    } else if (mode === 'cementing') {
                        metricStatus.innerText = "Cement plug set successfully.";
                        metricStatus.className = "text-sm font-bold text-emerald-500 leading-tight";
                    } else if (mode === 'logging') {
                        metricStatus.innerText = "Log successfully acquired.";
                        metricStatus.className = "text-sm font-bold text-emerald-500 leading-tight";
                    } else if (mode === 'milling') {
                        metricStatus.innerText = "Wellbore clean. Target depth reached.";
                        metricStatus.className = "text-sm font-bold text-emerald-500 leading-tight";
                    } else {
                        metricStatus.innerText = "Survey Complete. Data recovered.";
                        metricStatus.className = "text-sm font-bold text-emerald-500 leading-tight";
                    }
                }
            }

            updateMetrics();

            // Render Frame
            drawEnvironment();
            drawTool();

            // Render Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.update(SURF_Y + toolDepth);
                p.draw();
                if (!p.active) particles.splice(i, 1);
            }

            animationFrameId = requestAnimationFrame(animate);
        }

        // Init App
        setMode('survey');
        animate();

    </script>
</body>
</html>
