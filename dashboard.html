    <style>

        .nav-btn.active { background-color: #1e293b; border-left-color: #38bdf8; color: #38bdf8; font-weight: bold; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); }
        .nav-btn:hover:not(.active) { background-color: #334155; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }
    </style>
</head>

    <div class="flex-1 h-full relative">
        <!-- Default page points to the map -->
        <iframe id="sim-frame" src="turkiye_enerji_haritasi.html" class="w-full h-full border-none"></iframe>

    <script>
        function loadSim(url, btnElement) {
            document.getElementById('sim-frame').src = url;
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
        }
    </script>
